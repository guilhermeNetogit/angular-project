<h3>
  Módulo de Usuários.
</h3>
<input type="text" #cursoInput placeholder="Digite o nome do curso...">
<button (click)="onAddCurso(cursoInput.value)">Add Cuso</button>
<app-usuarios-detalhe></app-usuarios-detalhe>

<ul>
  @for (curso of cursos; track curso) {
  <li>{{ curso }}</li>
  } @empty {
      <li>Nenhum curso encontrado.</li>
    }
</ul>
