<h3>Módulo de Usuários.</h3>
<p>Página: {{ pagina }}</p>

<!-- Container usando a classe do arquivo SCSS -->
<div class="form-container">
  <input type="text" #cursoInput placeholder="Digite o nome do curso...">

  <button mat-raised-button color="primary" (click)="onAddCurso(cursoInput.value); cursoInput.value = ''">
    Add Curso
  </button>
</div>

<router-outlet></router-outlet>

<mat-action-list>
  @for (curso of cursos; track curso.id) {
    <button mat-list-item
    [routerLink]="['/curso', curso.id]"
    (click)="action(curso.nomeCurso)">
      {{ curso.id }}. {{ curso.nomeCurso }}
    </button>
  } @empty {
    <mat-list-item disabled>Nenhum curso encontrado.</mat-list-item>
  }
</mat-action-list>
