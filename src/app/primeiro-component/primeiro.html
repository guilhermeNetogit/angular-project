<section class="event-binding">
  <article>
    <h3>Event Binding</h3>
    <div>
      <section>
        <div class="example-button-row">
          <button matButton="elevated"
          (click) = "botaoClicado()">Verificar...</button>
        </div>
      </section>

      <section class="input-output-prop">
        <article>
          <h3>Input / Output Properties</h3>
          <app-usuario [nome] = 'nomeUsuario'></app-usuario>

          <app-contador [valor] ="valorContador" (mudouValor)='onMudouValor($event)'></app-contador>
        </article>
      </section>
    </div>
  </article>
</section>
