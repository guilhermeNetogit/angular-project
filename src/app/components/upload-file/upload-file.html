<div class="upload-container">
  <label class="upload-box">
    <!-- Input real escondido para fins de acessibilidade e funcionamento -->
    <input type="file" class="file-input" (change)="onFileSelected($event)">

    <div class="upload-content">
      <div class="text-wrapper">
        <span class="upload-label">Selecionar arquivo</span>
        <span class="file-name" [class.has-file]="fileName">
          {{ fileName || 'Nenhum arquivo selecionado' }}
        </span>
      </div>

      <div class="icon-button">
        <!-- Ícone de Clipe Simples (SVG inline para não depender de pacotes externos) -->
        <svg viewBox="0 0 24 24" class="clip-icon">
          <path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-3.31 2.69-6 6-6s6 2.69 6 6v12.5c0 4.42-3.58 8-8 8s-8-3.58-8-8V6h2v11.5c0 3.31 2.69 6 6 6s6-2.69 6-6V5c0-2.21-1.79-4-4-4s-4 1.79-4 4v12.5c0 1.1.9 2 2 2s2-.9 2-2V6h2z"/>
        </svg>
      </div>
    </div>
  </label>
</div>
